# Minimal tmux theme: transparent bg (inherits terminal) + colored text.
# Keeps tmux's default layout/content — only restyles colors.

set -g status "on"
set -g status-justify "left"
set -g status-interval 5

# Transparent backgrounds across the status line + colored foreground
set -g status-style "bg=default,fg=green"
set -g status-left-style "bg=default,fg=green"
set -g status-right-style "bg=default,fg=green"
set -g message-style "bg=default,fg=green"
set -g message-command-style "bg=default,fg=green"

# Windows
setw -g window-status-style "bg=default,fg=green"
setw -g window-status-current-style "bg=default,fg=green,bold"
setw -g window-status-activity-style "bg=default,fg=yellow"

# Panes — subtle borders so they don't fight the transparent bar
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"
