# Alabaster tmux theme
# Palette matches dchinmay2/alabaster.nvim's dark lualine theme + the
# alabaster-dark ghostty theme, so tmux stays visually consistent with
# nvim/terminal:
#   base   #162022  (statusline bg)
#   fg     #cecece  (text)
#   muted  #9F9F9F  (inactive text)
#   block  #333333  (nvim "normal mode" indicator bg)
#   accent #cd974b  (cursor / orange accent)
#   visual #cc8bc9  (purple accent)

set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g status-right-style "none"
set -g status-style "none,bg=#162022"
set -g status-right-length "100"
set -g status-left-length "100"
set -g status-interval 5

set -g message-style "fg=#162022,bg=#cecece"
set -g message-command-style "fg=#162022,bg=#cecece"

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#cd974b,bold"

setw -g window-status-separator ""
setw -g window-status-style "none,fg=#9F9F9F,bg=#162022"
setw -g window-status-activity-style "none,fg=#cc8bc9,bg=#162022,bold"

# Left: [session] + zoom indicator, solid accent block
set -g status-left "#[fg=#162022,bg=#cd974b,bold] #S #[fg=#cd974b,bg=#162022,nobold]#{?window_zoomed_flag, #[fg=#cd974b]Z,}  "

# Right: git branch + time
set -g status-right "  #[fg=#9F9F9F]#(cd #{pane_current_path}; git branch --show-current 2>/dev/null)  #[fg=#333333]%R "

# Inactive windows
setw -g window-status-format "#[fg=#9F9F9F] #I #W "

# Active window: solid block (mirrors alabaster's normal-mode lualine indicator)
# for strong contrast against the status bar background.
setw -g window-status-current-format "#[fg=#cecece,bg=#333333,bold] #I #W #[fg=#333333,bg=#162022,nobold]"