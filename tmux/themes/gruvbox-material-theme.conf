set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#ddc7a1,bg=#504945"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#89b482,bold"
set -g status-style "none,bg=#32302f"
set -g message-style "fg=#ddc7a1,bg=#504945"
set -g pane-border-style "fg=#504945"
set -g status-right-length "100"
set -g status-left-length "100"
set -g status-interval 5

setw -g window-status-activity-style "none,fg=#a89984,bg=#32302f"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#a89984,bg=#32302f"

# Left: [session] + zoom indicator
set -g status-left "#[fg=#a89984][#[fg=#89b482,bold]#S#[fg=#a89984,nobold]]#{?window_zoomed_flag, #[fg=#a89984]Z,}  "

# Right: git branch + time
set -g status-right "  #[fg=#a89984]#(cd #{pane_current_path}; git branch --show-current 2>/dev/null)  #[fg=#504945]%R "

# Inactive windows
setw -g window-status-format "#[fg=#a89984] #I #W "

# Active window
setw -g window-status-current-format "#[fg=#89b482,bold] #I #W #[nobold]"
